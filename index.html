<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://www.transparenttextures.com/patterns/medical-icons.png');
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .chat-container {
            height: calc(100vh - 12rem);
        }
        .blob {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 50%;
            filter: blur(50px);
            z-index: -1;
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .tab-active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }
        .tab-inactive {
            color: #6B7280;
            border-bottom: 2px solid transparent;
        }
        .tab-inactive:hover {
            color: #4B5563;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50">
        <!-- Navigation Tabs -->
        <div class="border-b border-gray-200">
            <div class="container mx-auto px-4">
                <nav class="flex space-x-8">
                    <button onclick="switchTab('chat')" class="tab-active px-4 py-4 text-sm font-medium transition-colors duration-200 ease-in-out">
                        Chat
                    </button>
                    <button onclick="switchTab('podcasts')" class="tab-inactive px-4 py-4 text-sm font-medium transition-colors duration-200 ease-in-out">
                        Podcasts
                    </button>
                </nav>
            </div>
        </div>

        <!-- Main Content -->
        <div class="container mx-auto px-4 py-8">
            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Upload Section - Left Side -->
                <div class="lg:w-1/3">
                    <!-- Doctor Info -->
                    <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
                        <div class="flex items-center gap-4 mb-3">
                            <img src="https://static.wixstatic.com/media/06422e_2ad5633eaef843d590f2b44f44a8968f~mv2.png/v1/fill/w_688,h_688,al_c,q_90,usm_0.66_1.00_0.01,enc_avif,quality_auto/Ashita%20Tolwani%20MD.png" 
                                 alt="Dr. Ashita Tolwani" 
                                 class="w-20 h-20 rounded-full shadow-lg border-2 border-white"
                            >
                            <div>
                                <h1 class="text-2xl font-bold text-gray-800">Ashita Tolwani MD</h1>
                                <p class="text-gray-600">AI Medical Assistant</p>
                            </div>
                        </div>
                        <p class="text-gray-600 text-sm">Upload a document and ask me any questions about it.</p>
                    </div>

                    <!-- Upload Box -->
                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <h2 class="text-xl font-semibold text-gray-800 mb-6">Upload Medical References</h2>
                        
                        <form id="uploadForm" class="space-y-4">
                            <div class="flex items-center justify-center w-full">
                                <label class="flex flex-col w-full h-40 border border-dashed border-gray-300 rounded-lg transition-all duration-300 ease-in-out cursor-pointer bg-white hover:bg-gray-50">
                                    <div class="flex flex-col items-center justify-center py-6 px-4">
                                        <div class="mb-3">
                                            <i class="fas fa-cloud-upload-alt text-4xl text-gray-400"></i>
                                        </div>
                                        <p class="text-gray-600 mb-1">Drop your PDF files here or click to browse</p>
                                        <p class="text-sm text-gray-500">Supported format: PDF</p>
                                    </div>
                                    <input type="file" class="hidden" accept=".pdf" id="fileInput">
                                </label>
                            </div>
                            <div id="uploadStatus" class="text-center text-sm"></div>
                        </form>
                    </div>

                </div>

                <!-- Chat Section - Right Side -->
                <div class="lg:w-2/3">
                    <div class="bg-white rounded-xl shadow-lg h-full">
                        <div id="chat-container" class="flex flex-col h-[calc(100vh-12rem)]">
                            <!-- Chat Input Section -->
                            <form id="questionForm" class="p-4 border-b">
                                <div class="flex flex-col gap-4">
                                    <textarea 
                                        id="questionInput" 
                                        placeholder="Type your medical question here..." 
                                        class="w-full p-4 min-h-[100px] border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-300 resize-none"
                                    ></textarea>
                                    <div class="flex justify-between items-center px-2">
                                        <div class="flex items-center gap-4">
                                            <button type="button" class="text-gray-400 hover:text-gray-600">
                                                <i class="fas fa-microphone text-lg"></i>
                                            </button>
                                            <span class="text-xs text-gray-500">Press Enter to send</span>
                                        </div>
                                        <button type="submit" 
                                                class="gradient-bg text-white px-6 py-2 rounded-lg hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-300 font-medium flex items-center gap-2"
                                        >
                                            <span>Send</span>
                                            <i class="fas fa-paper-plane"></i>
                                        </button>
                                    </div>
                                </div>
                            </form>

                            <!-- Chat History -->
                            <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-4">
                                <!-- Messages will be dynamically added here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            let currentTab = 'chat';

            function switchTab(tab) {
                // Update current tab
                currentTab = tab;
                
                // Update tab styles
                document.querySelectorAll('nav button').forEach(button => {
                    if (button.textContent.trim().toLowerCase() === tab) {
                        button.classList.remove('tab-inactive');
                        button.classList.add('tab-active');
                    } else {
                        button.classList.remove('tab-active');
                        button.classList.add('tab-inactive');
                    }
                });

                // TODO: Add logic to show/hide content based on selected tab
            }

            function addMessageToChat(type, message) {
                const chatMessages = document.getElementById('chat-history');
                const messageDiv = document.createElement('div');
                
                if (type === 'user') {
                    messageDiv.className = 'flex items-start gap-3 flex-row-reverse';
                    messageDiv.innerHTML = `
                        <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center flex-shrink-0">
                            <i class="fas fa-user text-gray-500 text-sm"></i>
                        </div>
                        <div class="gradient-bg text-white rounded-lg p-4 max-w-[80%]">
                            <p>${message}</p>
                        </div>
                    `;
                } else {
                    messageDiv.className = 'flex items-start gap-3';
                    messageDiv.innerHTML = `
                        <div class="w-8 h-8 rounded-full gradient-bg flex items-center justify-center flex-shrink-0">
                            <i class="fas fa-robot text-white text-sm"></i>
                        </div>
                        <div class="bg-gray-100 rounded-lg p-4 max-w-[80%]">
                            <p>${message}</p>
                        </div>
                    `;
                }
                
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            // Handle file upload
            document.getElementById('uploadForm').addEventListener('submit', async (e) => {
                e.preventDefault();
            });

            document.getElementById('fileInput').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const formData = new FormData();
                formData.append('file', file);

                const statusDiv = document.getElementById('uploadStatus');
                statusDiv.innerHTML = `
                    <div class="flex items-center justify-center gap-2 text-primary">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span>Uploading...</span>
                    </div>
                `;

                try {
                    const response = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (response.ok) {
                        statusDiv.innerHTML = `
                            <div class="flex items-center justify-center gap-2 text-green-500">
                                <i class="fas fa-check-circle"></i>
                                <span>File uploaded successfully!</span>
                            </div>
                        `;
                    } else {
                        throw new Error(data.error);
                    }
                } catch (error) {
                    statusDiv.innerHTML = `
                        <div class="flex items-center justify-center gap-2 text-red-500">
                            <i class="fas fa-exclamation-circle"></i>
                            <span>Error: ${error.message}</span>
                        </div>
                    `;
                }
            });

            // Handle question submission
            document.getElementById('questionForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const questionInput = document.getElementById('questionInput');
                const question = questionInput.value.trim();
                if (!question) return;

                addMessageToChat('user', question);
                questionInput.value = '';

                try {
                    const response = await fetch('/query', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ question })
                    });
                    const data = await response.json();
                    
                    if (response.ok) {
                        addMessageToChat('assistant', data.answer);
                    } else {
                        throw new Error(data.error);
                    }
                } catch (error) {
                    addMessageToChat('assistant', `Error: ${error.message}`);
                }
            });

            // Enter key handler
            document.getElementById('questionInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    document.getElementById('questionForm').dispatchEvent(new Event('submit'));
                }
            });
        </script>
    </body>
</html>
